<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SUBWAY DASH — Infinite Runner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon-yellow: #FFE600;
    --neon-orange: #FF6B00;
    --neon-cyan: #00F5FF;
    --neon-pink: #FF0080;
    --dark: #0A0A0F;
    --darker: #050508;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--darker);
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    touch-action: none;
  }

  #game-canvas { display: block; width: 100%; height: 100%; }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; width: 100%; pointer-events: none;
    z-index: 10;
    padding: 16px 20px;
    display: flex; justify-content: space-between; align-items: flex-start;
  }

  #score-block { text-align: left; }
  #score-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(11px, 2vw, 13px);
    color: var(--neon-yellow);
    letter-spacing: 3px;
    opacity: 0.7;
  }
  #score-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 7vw, 56px);
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 30px rgba(255,230,0,0.5);
    transition: transform 0.1s;
  }
  #score-value.bump { transform: scale(1.15); }

  #high-score-block { text-align: right; }
  #hs-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(10px, 1.8vw, 12px);
    color: var(--neon-cyan);
    letter-spacing: 3px;
    opacity: 0.7;
  }
  #hs-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(22px, 4vw, 32px);
    color: var(--neon-cyan);
    line-height: 1;
    text-shadow: 0 0 20px rgba(0,245,255,0.4);
  }

  /* Power-up bar */
  #powerup-hud {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; pointer-events: none; z-index: 10;
  }
  .pu-badge {
    background: rgba(0,0,0,0.6);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: #fff;
    display: flex; align-items: center; gap: 6px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .pu-badge.active { opacity: 1; }
  .pu-badge .pu-timer {
    width: 28px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    overflow: hidden;
  }
  .pu-badge .pu-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.1s linear;
  }
  #pu-jetpack { border-color: rgba(255,107,0,0.6); }
  #pu-jetpack .pu-fill { background: var(--neon-orange); }
  #pu-magnet { border-color: rgba(0,245,255,0.6); }
  #pu-magnet .pu-fill { background: var(--neon-cyan); }
  #pu-multiplier { border-color: rgba(255,230,0,0.6); }
  #pu-multiplier .pu-fill { background: var(--neon-yellow); }

  /* Speed indicator */
  #speed-bar {
    position: fixed; top: 50%; right: 14px;
    transform: translateY(-50%);
    width: 4px; height: 100px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    z-index: 10; pointer-events: none;
  }
  #speed-fill {
    position: absolute; bottom: 0; left: 0; width: 100%;
    background: linear-gradient(to top, var(--neon-yellow), var(--neon-orange));
    border-radius: 2px;
    transition: height 0.5s ease;
  }

  /* Coin counter */
  #coin-hud {
    position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    z-index: 10; pointer-events: none;
    padding: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  #coin-icon {
    width: 22px; height: 22px;
    background: var(--neon-yellow);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--neon-yellow);
    position: relative;
  }
  #coin-icon::after {
    content: '$';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue'; font-size: 13px; color: #000;
  }
  #coin-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; color: var(--neon-yellow);
    text-shadow: 0 0 15px rgba(255,230,0,0.6);
  }

  /* SCREENS */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 0.5s, transform 0.5s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.05); }

  /* START SCREEN */
  #start-screen {
    background: radial-gradient(ellipse at 50% 40%, #1a0a2e 0%, var(--darker) 70%);
  }
  .start-bg-lines {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none;
  }
  .start-bg-lines::before {
    content: '';
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 200%; height: 60%;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent calc(8vw - 1px),
      rgba(255,230,0,0.06) calc(8vw - 1px),
      rgba(255,230,0,0.06) 8vw
    );
    perspective: 400px;
    transform: translateX(-50%) perspective(300px) rotateX(60deg);
    transform-origin: bottom center;
  }

  .game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 12vw, 100px);
    color: #fff;
    letter-spacing: 6px;
    line-height: 0.9;
    text-align: center;
    text-shadow:
      0 0 40px rgba(255,107,0,0.8),
      0 0 80px rgba(255,107,0,0.4),
      0 4px 0 rgba(255,107,0,0.5);
    z-index: 1;
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 40px rgba(255,107,0,0.8), 0 0 80px rgba(255,107,0,0.4); }
    50% { text-shadow: 0 0 60px rgba(255,107,0,1), 0 0 120px rgba(255,107,0,0.6), 0 0 200px rgba(255,107,0,0.2); }
  }
  .game-subtitle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(14px, 3vw, 20px);
    letter-spacing: 8px;
    color: var(--neon-cyan);
    margin-top: 8px;
    z-index: 1;
    opacity: 0.8;
  }

  .start-btn {
    margin-top: 40px;
    padding: 16px 50px;
    background: var(--neon-yellow);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(20px, 4vw, 28px);
    letter-spacing: 4px;
    border: none; border-radius: 4px;
    cursor: pointer; z-index: 1;
    box-shadow: 0 0 30px rgba(255,230,0,0.5), 0 4px 0 rgba(0,0,0,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    pointer-events: all;
  }
  .start-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 0 50px rgba(255,230,0,0.7), 0 7px 0 rgba(0,0,0,0.3); }
  .start-btn:active { transform: translateY(1px) scale(0.98); }

  .controls-hint {
    margin-top: 28px;
    z-index: 1;
    text-align: center;
  }
  .controls-hint p {
    font-size: clamp(11px, 2vw, 14px);
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    line-height: 2;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
  }
  .key {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
  }

  /* GAME OVER SCREEN */
  #gameover-screen {
    background: radial-gradient(ellipse at 50% 50%, #2a0a0a 0%, var(--darker) 70%);
  }
  .go-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 14vw, 110px);
    color: var(--neon-pink);
    letter-spacing: 4px;
    line-height: 0.9;
    text-shadow: 0 0 50px rgba(255,0,128,0.7), 0 4px 0 rgba(255,0,128,0.4);
    animation: goShake 0.5s ease-out;
    z-index: 1;
  }
  @keyframes goShake {
    0% { transform: translateX(-20px) rotate(-3deg); }
    25% { transform: translateX(15px) rotate(2deg); }
    50% { transform: translateX(-10px) rotate(-1deg); }
    75% { transform: translateX(5px); }
    100% { transform: none; }
  }
  .go-stats {
    margin-top: 24px;
    display: flex; gap: 30px; z-index: 1;
  }
  .stat-box {
    text-align: center;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 16px 24px;
  }
  .stat-label {
    font-family: 'Bebas Neue'; font-size: 11px;
    letter-spacing: 3px; color: rgba(255,255,255,0.4);
  }
  .stat-val {
    font-family: 'Bebas Neue'; font-size: 36px;
    color: #fff; line-height: 1.1;
  }
  .stat-val.gold { color: var(--neon-yellow); }
  .stat-val.cyan { color: var(--neon-cyan); }

  .new-best {
    font-family: 'Bebas Neue'; font-size: 16px;
    letter-spacing: 4px; color: var(--neon-yellow);
    margin-top: 10px;
    opacity: 0;
    animation: fadeInBounce 0.5s ease-out 0.5s forwards;
    z-index: 1;
  }
  @keyframes fadeInBounce {
    0% { opacity: 0; transform: scale(0.5); }
    70% { opacity: 1; transform: scale(1.1); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Floating score popup */
  .score-popup {
    position: fixed;
    font-family: 'Bebas Neue'; font-size: 22px;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px rgba(255,230,0,0.8);
    pointer-events: none; z-index: 50;
    animation: popupFloat 1s ease-out forwards;
  }
  @keyframes popupFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
  }

  /* Chaser warning */
  #chaser-warning {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--neon-pink), transparent, var(--neon-pink));
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #chaser-warning.danger { opacity: 1; animation: warningPulse 0.4s ease-in-out infinite; }
  @keyframes warningPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* Mobile swipe zones */
  #swipe-zone {
    position: fixed; inset: 0; z-index: 5;
    touch-action: none;
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>
<div id="swipe-zone"></div>

<!-- HUD -->
<div id="hud">
  <div id="score-block">
    <div id="score-label">SCORE</div>
    <div id="score-value">0</div>
  </div>
  <div id="high-score-block">
    <div id="hs-label">BEST</div>
    <div id="hs-value">0</div>
  </div>
</div>
<div id="coin-hud">
  <div id="coin-icon"></div>
  <div id="coin-count">0</div>
</div>
<div id="speed-bar"><div id="speed-fill" style="height:10%"></div></div>
<div id="powerup-hud">
  <div class="pu-badge" id="pu-jetpack">🚀 JETPACK <div class="pu-timer"><div class="pu-fill" id="pf-jetpack" style="width:100%"></div></div></div>
  <div class="pu-badge" id="pu-magnet">🧲 MAGNET <div class="pu-timer"><div class="pu-fill" id="pf-magnet" style="width:100%"></div></div></div>
  <div class="pu-badge" id="pu-multiplier">✕2 COINS <div class="pu-timer"><div class="pu-fill" id="pf-multiplier" style="width:100%"></div></div></div>
</div>
<div id="chaser-warning"></div>

<!-- START SCREEN -->
<div class="screen" id="start-screen">
  <div class="start-bg-lines"></div>
  <div class="game-title">SUBWAY<br>DASH</div>
  <div class="game-subtitle">INFINITE RUNNER</div>
  <button class="start-btn" id="start-btn">TAP TO RUN</button>
  <div class="controls-hint">
    <p><span class="key">←</span><span class="key">→</span> Change Lane &nbsp;|&nbsp; <span class="key">SPACE</span> Jump &nbsp;|&nbsp; <span class="key">↓</span> Slide</p>
    <p>SWIPE LEFT / RIGHT / UP / DOWN on mobile</p>
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen hidden" id="gameover-screen">
  <div class="go-title">BUSTED!</div>
  <div class="go-stats">
    <div class="stat-box">
      <div class="stat-label">Score</div>
      <div class="stat-val gold" id="go-score">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Coins</div>
      <div class="stat-val cyan" id="go-coins">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Best</div>
      <div class="stat-val" id="go-best">0</div>
    </div>
  </div>
  <div class="new-best" id="new-best-label" style="display:none">⭐ NEW BEST! ⭐</div>
  <button class="start-btn" id="restart-btn" style="margin-top:30px">PLAY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ============================================================
//  SUBWAY DASH — Complete 3D Infinite Runner
// ============================================================

const canvas = document.getElementById('game-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x020210);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050520, 0.018);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 5, 10);
camera.lookAt(0, 2, -10);

// ──────────────────────────────────────────
//  CONSTANTS
// ──────────────────────────────────────────
const LANE_X = [-2.5, 0, 2.5];
const TILE_LENGTH = 30;
const TILE_COUNT = 8;
const BASE_SPEED = 14;
const MAX_SPEED = 32;
const JUMP_VEL = 12;
const GRAVITY = -28;
const SLIDE_DURATION = 0.6;

let gameState = 'start'; // start | playing | dead
let score = 0, coins = 0, highScore = parseInt(localStorage.getItem('sdash_hs') || '0');
let speed = BASE_SPEED;
let distance = 0;
let multiplier = 1;
let isPaused = false;

// Power-up timers
const powerups = { jetpack: 0, magnet: 0, multiplier: 0 };
const PU_DURATION = 8;

// ──────────────────────────────────────────
//  LIGHTS
// ──────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x112244, 1.0);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0x88aaff, 1.4);
sunLight.position.set(5, 20, 10);
sunLight.castShadow = true;
sunLight.shadow.camera.near = 0.1;
sunLight.shadow.camera.far = 100;
sunLight.shadow.camera.left = -20;
sunLight.shadow.camera.right = 20;
sunLight.shadow.camera.top = 20;
sunLight.shadow.camera.bottom = -20;
sunLight.shadow.mapSize.set(1024, 1024);
scene.add(sunLight);

const rimLight = new THREE.DirectionalLight(0xff00ff, 0.5);
rimLight.position.set(-5, 5, -10);
scene.add(rimLight);

// ──────────────────────────────────────────
//  MATERIALS (shared, instanced for perf)
// ──────────────────────────────────────────
const MAT = {
  ground: new THREE.MeshLambertMaterial({ color: 0x080818, emissive: 0x010106 }),
  rail: new THREE.MeshLambertMaterial({ color: 0x00ffff, emissive: 0x003333 }),
  stripe: new THREE.MeshLambertMaterial({ color: 0x00ffff, emissive: 0x003333 }),
  obstacle: new THREE.MeshLambertMaterial({ color: 0xcc2200 }),
  train: new THREE.MeshLambertMaterial({ color: 0x0077cc, emissive: 0x001133 }),
  trainWindow: new THREE.MeshLambertMaterial({ color: 0x00ffff, emissive: 0x009999 }),
  player: new THREE.MeshLambertMaterial({ color: 0xff6600 }),
  playerAccent: new THREE.MeshLambertMaterial({ color: 0x00ffff, emissive: 0x003333 }),
  coin: new THREE.MeshLambertMaterial({ color: 0xFFE600, emissive: 0x442200 }),
  coinGlow: new THREE.MeshLambertMaterial({ color: 0xFFE600, transparent: true, opacity: 0.3 }),
  jetpackPU: new THREE.MeshLambertMaterial({ color: 0xff4400, emissive: 0x220a00 }),
  magnetPU: new THREE.MeshLambertMaterial({ color: 0x00ccff, emissive: 0x002233 }),
  multiplierPU: new THREE.MeshLambertMaterial({ color: 0xffee00, emissive: 0x332200 }),
  chaser: new THREE.MeshLambertMaterial({ color: 0x9900cc, emissive: 0x220033 }),
  chaserBadge: new THREE.MeshLambertMaterial({ color: 0xff00ff, emissive: 0x440033 }),
  building: new THREE.MeshLambertMaterial({ color: 0x060614, emissive: 0x010105 }),
  buildingWindow: new THREE.MeshLambertMaterial({ color: 0x00ffff, emissive: 0x005555, transparent: true, opacity: 0.9 }),
  buildingWindowB: new THREE.MeshLambertMaterial({ color: 0xff00ff, emissive: 0x440033, transparent: true, opacity: 0.9 }),
  sky: new THREE.MeshBasicMaterial({ color: 0x020210, side: THREE.BackSide }),
};

// ──────────────────────────────────────────
//  PLAYER
// ──────────────────────────────────────────
const playerGroup = new THREE.Group();
scene.add(playerGroup);

function buildPlayer() {
  playerGroup.clear();
  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.7, 0.3), MAT.player);
  body.position.y = 0.85; body.castShadow = true;
  playerGroup.add(body);
  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.4), MAT.player);
  head.position.y = 1.45; head.castShadow = true;
  playerGroup.add(head);
  // Cap
  const cap = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.12, 0.46), MAT.playerAccent);
  cap.position.y = 1.68; playerGroup.add(cap);
  // Legs
  [-0.16, 0.16].forEach((x, i) => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.45, 0.22), MAT.player);
    leg.position.set(x, 0.22, 0); leg.castShadow = true;
    leg.name = `leg_${i}`; playerGroup.add(leg);
  });
  // Arms
  [-0.42, 0.42].forEach((x, i) => {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.4, 0.18), MAT.player);
    arm.position.set(x, 0.92, 0); arm.castShadow = true;
    arm.name = `arm_${i}`; playerGroup.add(arm);
  });
  // Bag
  const bag = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.5, 0.18), MAT.playerAccent);
  bag.position.set(0, 0.9, 0.22); playerGroup.add(bag);
}
buildPlayer();

const player = {
  lane: 1, targetLane: 1,
  x: 0, targetX: 0,
  y: 0,
  velY: 0,
  isJumping: false,
  isSliding: false,
  slideTimer: 0,
  invincible: 0,
  group: playerGroup,
};

// Bounding box (for AABB collision)
const playerBB = new THREE.Box3();

// ──────────────────────────────────────────
//  CHASER
// ──────────────────────────────────────────
const chaserGroup = new THREE.Group();
scene.add(chaserGroup);

function buildChaser() {
  chaserGroup.clear();
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.8, 0.35), MAT.chaser);
  body.position.y = 0.9; chaserGroup.add(body);
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.45), MAT.chaser);
  head.position.y = 1.55; chaserGroup.add(head);
  // Hat
  const hat = new THREE.Mesh(new THREE.BoxGeometry(0.56, 0.35, 0.52), MAT.chaser);
  hat.position.y = 1.87; chaserGroup.add(hat);
  const hatBrim = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.06, 0.68), MAT.chaserBadge);
  hatBrim.position.y = 1.71; chaserGroup.add(hatBrim);
  [-0.18, 0.18].forEach((x) => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.5, 0.24), MAT.chaser);
    leg.position.set(x, 0.25, 0); chaserGroup.add(leg);
  });
  [-0.45, 0.45].forEach((x) => {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.45, 0.2), MAT.chaser);
    arm.position.set(x, 0.95, 0); chaserGroup.add(arm);
  });
  // Badge
  const badge = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.14, 0.04), MAT.chaserBadge);
  badge.position.set(0, 0.95, 0.2); chaserGroup.add(badge);
}
buildChaser();

const chaser = { z: 18, catchZ: 8, x: 0 };

// ──────────────────────────────────────────
//  TRACK TILES
// ──────────────────────────────────────────
const tiles = [];
const obstacles = [];
const coinObjects = [];
const powerupObjects = [];

function createTile(zPos) {
  const tileGroup = new THREE.Group();
  tileGroup.position.z = zPos;

  // Ground slab
  const ground = new THREE.Mesh(new THREE.BoxGeometry(8, 0.3, TILE_LENGTH), MAT.ground);
  ground.position.y = -0.15;
  ground.receiveShadow = true;
  tileGroup.add(ground);

  // Lane stripes (dashed)
  for (let i = 0; i < 3; i++) {
    for (let s = -TILE_LENGTH / 2 + 2; s < TILE_LENGTH / 2; s += 3.5) {
      const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.01, 1.2), MAT.stripe);
      stripe.position.set(LANE_X[0] + (LANE_X[1] - LANE_X[0]) * (i === 0 ? 0.5 : 1.5) - (i === 2 ? LANE_X[1] - LANE_X[0] : 0), 0, s);
      if (i < 2) tileGroup.add(stripe);
    }
  }
  // Side walls / rails
  [-4.5, 4.5].forEach(x => {
    const rail = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.5, TILE_LENGTH), MAT.rail);
    rail.position.set(x, 0.25, 0);
    rail.receiveShadow = true;
    tileGroup.add(rail);
  });

  scene.add(tileGroup);
  tileGroup.userData.zBase = zPos;
  tiles.push(tileGroup);
}

function spawnObstaclesOnTile(tileGroup) {
  if (gameState !== 'playing') return;
  const zBase = tileGroup.userData.zBase;
  const numObs = Math.floor(Math.random() * 3) + 1;
  const usedLanes = new Set();

  for (let i = 0; i < numObs; i++) {
    let lane;
    let attempts = 0;
    do { lane = Math.floor(Math.random() * 3); attempts++; } while (usedLanes.has(lane) && attempts < 10);
    usedLanes.add(lane);

    const type = Math.random();
    const zOffset = -(Math.random() * (TILE_LENGTH - 6) + 2);
    const x = LANE_X[lane];

    if (type < 0.4) {
      // Barrier hurdle
      const obs = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.1, 0.4), MAT.obstacle);
      obs.position.set(x, 0.55, zBase + zOffset);
      obs.castShadow = true;
      scene.add(obs);
      obs.userData = { type: 'hurdle', lane, active: true };
      obstacles.push(obs);
    } else if (type < 0.65) {
      // Low barrier (slide under)
      const obs = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.55, 0.4), MAT.obstacle);
      obs.position.set(x, 1.4, zBase + zOffset);
      obs.castShadow = true;
      scene.add(obs);
      obs.userData = { type: 'overhead', lane, active: true };
      obstacles.push(obs);
    } else {
      // Train / moving obstacle — Futuristic Jet Train
      const trainGroup = new THREE.Group();
      trainGroup.position.set(x, 0, zBase + zOffset);

      // Sleek body
      const body2 = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.0, 4.0), MAT.train);
      body2.position.y = 1.0; body2.castShadow = true;
      trainGroup.add(body2);
      // Neon stripe top
      const nStripe = new THREE.Mesh(new THREE.BoxGeometry(1.82, 0.1, 4.02), MAT.trainWindow);
      nStripe.position.set(0, 1.95, 0); trainGroup.add(nStripe);
      // Neon stripe bottom
      const nStripe2 = new THREE.Mesh(new THREE.BoxGeometry(1.82, 0.1, 4.02), MAT.trainWindow);
      nStripe2.position.set(0, 0.15, 0); trainGroup.add(nStripe2);
      // Windows
      for (let w = 0; w < 3; w++) {
        const win = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.48, 0.05), MAT.trainWindow);
        win.position.set(-0.48 + w * 0.48, 1.2, -2.05);
        trainGroup.add(win);
      }
      // Aerodynamic nose
      const nose = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.8, 0.7), MAT.train);
      nose.position.set(0, 1.0, 2.35); trainGroup.add(nose);
      const noseTip = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), MAT.train);
      noseTip.position.set(0, 1.0, 2.85); trainGroup.add(noseTip);
      // Headlights
      const hlL = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.16, 0.05), MAT.trainWindow);
      hlL.position.set(-0.45, 0.9, 3.12); trainGroup.add(hlL);
      const hlR = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.16, 0.05), MAT.trainWindow);
      hlR.position.set(0.45, 0.9, 3.12); trainGroup.add(hlR);
      // Underbody neon
      const ugl = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.07, 3.6), MAT.trainWindow);
      ugl.position.set(-0.85, 0.05, 0); trainGroup.add(ugl);
      const ugr = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.07, 3.6), MAT.trainWindow);
      ugr.position.set(0.85, 0.05, 0); trainGroup.add(ugr);
      // Jet Thrusters (back)
      const fMat = new THREE.MeshLambertMaterial({ color: 0xff5500, emissive: 0xff2200, transparent: true, opacity: 0.9 });
      const fMat2 = new THREE.MeshLambertMaterial({ color: 0xffee00, emissive: 0xffaa00, transparent: true, opacity: 0.75 });
      [[-0.5, 0.5], [0.5, 0.5]].forEach(([tx, ty]) => {
        const housing = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.35), MAT.trainWindow);
        housing.position.set(tx, ty, -2.2); trainGroup.add(housing);
        const fl = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.85, 6), fMat);
        fl.position.set(tx, ty - 0.5, -2.2); fl.rotation.x = Math.PI;
        fl.name = 'flame_o'; trainGroup.add(fl);
        const fl2 = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.55, 6), fMat2);
        fl2.position.set(tx, ty - 0.52, -2.2); fl2.rotation.x = Math.PI;
        fl2.name = 'flame_i'; trainGroup.add(fl2);
      });

      scene.add(trainGroup);
      trainGroup.userData = { type: 'train', lane, active: true, moveX: (Math.random() > 0.5 ? 1 : -1) * 2 };
      obstacles.push(trainGroup);
    }
  }

  // Coins along a lane
  if (Math.random() > 0.2) {
    const coinLane = Math.floor(Math.random() * 3);
    const cx = LANE_X[coinLane];
    const count = Math.floor(Math.random() * 6) + 3;
    for (let c = 0; c < count; c++) {
      const coin = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.08, 8), MAT.coin);
      coin.rotation.x = Math.PI / 2;
      const cz = zBase - 3 - c * 1.2;
      coin.position.set(cx, 1.0, cz);
      coin.castShadow = false;
      scene.add(coin);
      coin.userData = { active: true, lane: coinLane };
      coinObjects.push(coin);
    }
  }

  // Power-up spawn (rare)
  if (Math.random() < 0.18) {
    const puLane = Math.floor(Math.random() * 3);
    const puZ = zBase - TILE_LENGTH / 2;
    const puType = ['jetpack', 'magnet', 'multiplier'][Math.floor(Math.random() * 3)];
    const puMat = { jetpack: MAT.jetpackPU, magnet: MAT.magnetPU, multiplier: MAT.multiplierPU }[puType];
    const pu = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.55), puMat);
    pu.position.set(LANE_X[puLane], 1.2, puZ);
    pu.userData = { type: puType, active: true };
    scene.add(pu);
    powerupObjects.push(pu);
  }
}

// Background buildings
function spawnBuilding(side, z) {
  const w = 3 + Math.random() * 5;
  const h = 8 + Math.random() * 30;
  const d = 4 + Math.random() * 4;
  const bldg = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), MAT.building);
  const xOff = side * (6 + w / 2 + Math.random() * 2);
  bldg.position.set(xOff, h / 2, z);
  scene.add(bldg);

  // Windows grid
  const cols = Math.floor(w / 1.1);
  const rows = Math.floor(h / 1.8);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() > 0.35) {
        const winMat = Math.random() > 0.5 ? MAT.buildingWindow : MAT.buildingWindowB;
        const win2 = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.65), winMat);
        win2.position.set(
          xOff - w / 2 + 0.55 + c * 1.1,
          1 + r * 1.8,
          z + d / 2 + 0.01
        );
        scene.add(win2);
      }
    }
  }
  return bldg;
}

//  INIT SCENE
// ──────────────────────────────────────────
const buildings = [];
function initScene() {
  tiles.forEach(t => scene.remove(t));
  tiles.length = 0;
  obstacles.forEach(o => scene.remove(o));
  obstacles.length = 0;
  coinObjects.forEach(c => scene.remove(c));
  coinObjects.length = 0;
  powerupObjects.forEach(p => scene.remove(p));
  powerupObjects.length = 0;
  buildings.forEach(b => scene.remove(b));
  buildings.length = 0;

  // Spawn initial tiles
  for (let i = 0; i < TILE_COUNT; i++) {
    createTile(-i * TILE_LENGTH);
  }
  // Spawn obstacles on tiles (skip first 2 for safety)
  for (let i = 2; i < TILE_COUNT; i++) {
    spawnObstaclesOnTile(tiles[i]);
  }
  // Background buildings
  for (let z = 0; z < TILE_COUNT * TILE_LENGTH; z += 25) {
    buildings.push(spawnBuilding(1, -z));
    buildings.push(spawnBuilding(-1, -z));
  }
}

// ──────────────────────────────────────────
//  INPUT
// ──────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;
  if (gameState !== 'playing') return;
  if (e.code === 'ArrowLeft') shiftLane(-1);
  if (e.code === 'ArrowRight') shiftLane(1);
  if (e.code === 'Space' || e.code === 'ArrowUp') doJump();
  if (e.code === 'ArrowDown') doSlide();
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

let touchStartX = 0, touchStartY = 0;
const swipeZone = document.getElementById('swipe-zone');
swipeZone.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
swipeZone.addEventListener('touchend', e => {
  if (gameState !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (Math.abs(dx) > 30) shiftLane(dx > 0 ? 1 : -1);
  } else {
    if (Math.abs(dy) > 30) { if (dy < 0) doJump(); else doSlide(); }
  }
}, { passive: true });

function shiftLane(dir) {
  const newLane = Math.max(0, Math.min(2, player.targetLane + dir));
  player.targetLane = newLane;
  player.targetX = LANE_X[newLane];
}
function doJump() {
  if (powerups.jetpack > 0) return;
  if (!player.isJumping || player.y < 0.1) {
    player.velY = JUMP_VEL;
    player.isJumping = true;
    player.isSliding = false;
    player.slideTimer = 0;
  }
}
function doSlide() {
  if (!player.isJumping && !player.isSliding) {
    player.isSliding = true;
    player.slideTimer = SLIDE_DURATION;
  }
}

// ──────────────────────────────────────────
//  COLLISION
// ──────────────────────────────────────────
const tempBB = new THREE.Box3();

function checkCollisions() {
  if (player.invincible > 0) return;

  // Player bounding box (adjusted for slide)
  const ph = player.isSliding ? 0.6 : 1.9;
  const py = player.y + (player.isSliding ? 0.3 : ph / 2);
  playerBB.setFromCenterAndSize(
    new THREE.Vector3(playerGroup.position.x, py, playerGroup.position.z),
    new THREE.Vector3(0.55, ph, 0.4)
  );

  // Obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const obs = obstacles[i];
    if (!obs.userData.active) continue;
    const obj = obs.isGroup ? obs : obs;
    tempBB.setFromObject(obj);
    if (playerBB.intersectsBox(tempBB)) {
      if (powerups.jetpack > 0) continue; // jetpack = invincible
      triggerGameOver();
      return;
    }
  }

  // Coins
  for (let i = coinObjects.length - 1; i >= 0; i--) {
    const c = coinObjects[i];
    if (!c.userData.active) continue;
    const attract = powerups.magnet > 0;
    const dx = playerGroup.position.x - c.position.x;
    const dz = playerGroup.position.z - c.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (attract && dist < 4) {
      c.position.x += dx * 0.15;
      c.position.z += dz * 0.15;
    }
    tempBB.setFromCenterAndSize(c.position, new THREE.Vector3(0.5, 0.5, 0.5));
    if (playerBB.intersectsBox(tempBB)) {
      c.userData.active = false;
      scene.remove(c);
      coinObjects.splice(i, 1);
      const val = multiplier;
      coins += val;
      score += 10 * val;
      bumpScore();
      const sv = playerGroup.position.clone().project(camera);
      spawnScorePopup(
        (sv.x + 1) / 2 * window.innerWidth,
        (1 - (sv.y + 1) / 2) * window.innerHeight,
        `+${10 * val}`
      );
    }
  }

  // Power-ups
  for (let i = powerupObjects.length - 1; i >= 0; i--) {
    const pu = powerupObjects[i];
    if (!pu.userData.active) continue;
    tempBB.setFromCenterAndSize(pu.position, new THREE.Vector3(0.8, 0.8, 0.8));
    if (playerBB.intersectsBox(tempBB)) {
      pu.userData.active = false;
      scene.remove(pu);
      powerupObjects.splice(i, 1);
      const puType = pu.userData.type;
      powerups[puType] = PU_DURATION;
      if (puType === 'multiplier') multiplier = 2;
      spawnScorePopup(
        window.innerWidth / 2,
        window.innerHeight / 2 - 40,
        puType.toUpperCase() + '!'
      );
    }
  }
}

function triggerGameOver() {
  gameState = 'dead';
  document.getElementById('swipe-zone').style.pointerEvents = 'none';
  const isNew = score > highScore;
  if (isNew) { highScore = Math.floor(score); localStorage.setItem('sdash_hs', highScore); }

  document.getElementById('go-score').textContent = Math.floor(score);
  document.getElementById('go-coins').textContent = coins;
  document.getElementById('go-best').textContent = highScore;
  const newBestLabel = document.getElementById('new-best-label');
  newBestLabel.style.display = isNew ? 'block' : 'none';

  const goScreen = document.getElementById('gameover-screen');
  goScreen.classList.remove('hidden');
  updateHUD();
}

function startGame() {

  speed = BASE_SPEED; multiplier = 1;

}

//  CAMERA SHAKE

let shakeAmount = 0;
function shakeCam(amount) { shakeAmount = amount; }

// ──────────────────────────────────────────
//  MAIN LOOP
// ──────────────────────────────────────────
let lastTime = 0;
let nextTileZ = -(TILE_COUNT - 1) * TILE_LENGTH;
let buildingZ = -TILE_COUNT * TILE_LENGTH;
let tileAnimFrame = 0;

function animate(time) {
  requestAnimationFrame(animate);
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  if (gameState !== 'playing') {
    renderer.render(scene, camera);
    return;
  }

  // Speed ramp
  speed = Math.min(MAX_SPEED, BASE_SPEED + distance * 0.003);

  // Move world forward
  const dz = speed * dt;
  distance += dz;
  score += dz * 0.5 * multiplier;

  // Move tiles
  tiles.forEach(t => {
    t.position.z += dz;
    if (t.position.z > TILE_LENGTH) {
      t.position.z -= TILE_COUNT * TILE_LENGTH;
      t.userData.zBase = t.userData.zBase - TILE_COUNT * TILE_LENGTH;
      spawnObstaclesOnTile(t);
    }
  });

  // Move obstacles
  obstacles.forEach((obs, idx) => {
    obs.position.z += dz;
    if (obs.userData.type === 'train') {
      obs.position.x += obs.userData.moveX * dt * 1.5;
      if (Math.abs(obs.position.x) > 4) obs.userData.moveX *= -1;
      // Flame animation
      obs.children.forEach(c => {
        if (c.name === 'flame_o') {
          const f = 0.8 + Math.sin(time * 0.022 + obs.position.z) * 0.22;
          c.scale.set(f, 0.7 + Math.sin(time * 0.017) * 0.3, f);
          c.material.opacity = 0.65 + Math.sin(time * 0.019) * 0.25;
        }
        if (c.name === 'flame_i') {
          const f2 = 0.7 + Math.cos(time * 0.028) * 0.28;
          c.scale.set(f2, f2, f2);
        }
      });
    }
    if (obs.position.z > 15) {
      scene.remove(obs);
      obstacles.splice(idx, 1);
    }
  });

  // Move coins
  coinObjects.forEach((c, idx) => {
    c.position.z += dz;
    c.rotation.y += dt * 3;
    if (c.position.z > 8) { scene.remove(c); coinObjects.splice(idx, 1); }
  });

  // Move powerups
  powerupObjects.forEach((p, idx) => {
    p.position.z += dz;
    p.rotation.y += dt * 2;
    p.position.y = 1.2 + Math.sin(time * 0.003 + idx) * 0.2;
    if (p.position.z > 8) { scene.remove(p); powerupObjects.splice(idx, 1); }
  });

  // Buildings
  buildings.forEach(b => {
    b.position.z += dz;
    if (b.position.z > 40) b.position.z -= 300;
  });

  // Player X (lane lerp)
  player.x = THREE.MathUtils.lerp(player.x, player.targetX, 1 - Math.pow(0.01, dt * 10));
  playerGroup.position.x = player.x;

  // Player Y (jump / gravity / jetpack)
  if (powerups.jetpack > 0) {
    player.y = THREE.MathUtils.lerp(player.y, 3.5, 1 - Math.pow(0.01, dt * 8));
    player.velY = 0; player.isJumping = false;
  } else {
    if (player.isJumping || player.y > 0.01) {
      player.velY += GRAVITY * dt;
      player.y = Math.max(0, player.y + player.velY * dt);
      if (player.y <= 0) { player.y = 0; player.velY = 0; player.isJumping = false; }
    }
  }
  playerGroup.position.y = player.y;

  // Slide
  if (player.isSliding) {
    player.slideTimer -= dt;
    if (player.slideTimer <= 0) player.isSliding = false;
  }

  // Player tilt on lane change
  const laneVel = (player.targetX - player.x);
  playerGroup.rotation.z = THREE.MathUtils.lerp(playerGroup.rotation.z, -laneVel * 0.15, 0.2);

  // Leg animation
  const legSpeed = speed / BASE_SPEED;
  const legSwing = Math.sin(time * 0.008 * legSpeed) * 0.45;
  const leg0 = playerGroup.getObjectByName('leg_0');
  const leg1 = playerGroup.getObjectByName('leg_1');
  const arm0 = playerGroup.getObjectByName('arm_0');
  const arm1 = playerGroup.getObjectByName('arm_1');
  if (leg0) leg0.rotation.x = player.isSliding ? 0.5 : legSwing;
  if (leg1) leg1.rotation.x = player.isSliding ? -0.5 : -legSwing;
  if (arm0) arm0.rotation.x = player.isSliding ? 0 : -legSwing;
  if (arm1) arm1.rotation.x = player.isSliding ? 0 : legSwing;

  // Slide squat
  const targetScaleY = player.isSliding ? 0.5 : 1;
  playerGroup.scale.y = THREE.MathUtils.lerp(playerGroup.scale.y, targetScaleY, 0.25);
  playerGroup.position.y = player.y + (player.isSliding ? -0.4 * (1 - playerGroup.scale.y) : 0);

  // Power-up timers
  ['jetpack', 'magnet', 'multiplier'].forEach(pu => {
    if (powerups[pu] > 0) {
      powerups[pu] -= dt;
      if (powerups[pu] <= 0) {
        powerups[pu] = 0;
        if (pu === 'multiplier') multiplier = 1;
      }
    }
  });

  // Chaser
  const targetChaserZ = 16;
  chaser.z = THREE.MathUtils.lerp(chaser.z, targetChaserZ, dt * 0.4);
  chaserGroup.position.z = chaser.z;
  chaserGroup.position.x = THREE.MathUtils.lerp(chaserGroup.position.x, playerGroup.position.x * 0.7, dt * 1.5);
  // Chaser leg animation
  const cLegSwing = Math.sin(time * 0.009) * 0.5;
  chaserGroup.children.forEach(c => {
    if (c.geometry && c.geometry.parameters && c.geometry.parameters.width === 0.24) {
      // legs
    }
  });

  // Chaser warning
  if (chaser.z < 11) {
    chaserWarning.classList.add('danger');
    shakeCam(0.05 + (11 - chaser.z) * 0.02);
  } else {
    chaserWarning.classList.remove('danger');
  }

  // Camera follow
  const camTargetY = 5 + player.y * 0.3;
  const camTargetX = playerGroup.position.x * 0.15;
  camera.position.x = THREE.MathUtils.lerp(camera.position.x, camTargetX, dt * 5);
  camera.position.y = THREE.MathUtils.lerp(camera.position.y, camTargetY, dt * 4);

  // Camera shake
  if (shakeAmount > 0) {
    camera.position.x += (Math.random() - 0.5) * shakeAmount;
    camera.position.y += (Math.random() - 0.5) * shakeAmount;
    shakeAmount *= 0.85;
    if (shakeAmount < 0.001) shakeAmount = 0;
  }

  // Sky follows
  sky.position.copy(camera.position);

  // Invincibility
  if (player.invincible > 0) player.invincible -= dt;

  // Collisions
  checkCollisions();

  // HUD
  updateHUD();

  renderer.render(scene, camera);
}

// ──────────────────────────────────────────
//  RESIZE
// ──────────────────────────────────────────
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ──────────────────────────────────────────
//  BUTTONS
// ──────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);


// ── CUSTOM BACKGROUND MUSIC ──────────────────────────────
let musicPlaying = false;

// Audio element for custom MP3
const bgMusic = document.createElement('audio');
bgMusic.src = 'only raj deb jeet .mp3';
bgMusic.loop = true;
bgMusic.volume = 0.6;
bgMusic.preload = 'auto';
document.body.appendChild(bgMusic);

function startMusic() {
  if (musicPlaying) return;
  bgMusic.play().then(() => {
    musicPlaying = true;
    mb.style.background = 'rgba(0,255,255,0.4)';
    mb.style.boxShadow = '0 0 14px #00ffff';
  }).catch(() => {});
}

function stopMusic() {
  bgMusic.pause();
  musicPlaying = false;
  mb.style.background = 'rgba(0,255,255,0.1)';
  mb.style.boxShadow = 'none';
}

// Music button
const mb = document.createElement('button');
mb.innerHTML = '🎵';
mb.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:300;width:42px;height:42px;border-radius:50%;background:rgba(0,255,255,0.15);border:1.5px solid #00ffff;color:#00ffff;font-size:18px;cursor:pointer;';
mb.onclick = () => {
  if (!musicPlaying) startMusic();
  else stopMusic();
};
document.body.appendChild(mb);

// Auto start on first tap/click (browser policy requires user gesture)
const autoStart = () => { if (!musicPlaying) startMusic(); };
document.addEventListener('click', autoStart, {once:true});
document.addEventListener('touchstart', autoStart, {once:true});

// ──────────────────────────────────────────
//  BOOT
// ──────────────────────────────────────────
hsEl.textContent = highScore;
requestAnimationFrame(animate);
</script>
